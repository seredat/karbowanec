name: Release

on:
  push:
    tags:
    - '*'

jobs:
  build-windows:
    name: Windows
    runs-on: windows-2022
    env:
      BOOST_ROOT: C:\thirdparties\boost-1.83.0
    steps:
      - uses: actions/checkout@master
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v1.1

      - name: Install OpenSSL
        run: choco install openssl

      - name: Install curl
        run: |
          choco install curl -y

      - name: Download and Install Boost 1.83
        run: |
          $Url = "https://sourceforge.net/projects/boost/files/boost-binaries/1.83.0/boost_1_83_0-msvc-14.3-64.exe"
          $OutputPath = "C:\\Users\\runneradmin\\AppData\\Local\\Temp\\boost-installer.exe"
          curl -L $Url -o $OutputPath
          Start-Process -Wait -FilePath $OutputPath "/SILENT","/SP-","/SUPPRESSMSGBOXES","/DIR=C:\\thirdparties\\boost-1.83.0"

      - name: Build
        shell: powershell
        id: build
        run: |
          $build_folder = "build"
          $krb_ver = "${{ github.ref }}" -replace 'refs/tags/'
          $release_name = "Karbo-cli-win64-$krb_ver"
          mkdir "$build_folder"
          cd "$build_folder"
          cmake -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DBOOST_ROOT="$env:BOOST_ROOT" `
            -DBOOST_INCLUDE_DIRS="$env:BOOST_ROOT/include" `
            ..
          msbuild Karbowanec.sln /p:Configuration=Release /m /v:detailed
          cd src\Release
          Compress-Archive -Path *.exe -DestinationPath "$release_name.zip"
          $sha256 = (Get-FileHash "$release_name.zip").Hash
          $asset_path = "./$build_folder/src/Release/$release_name.zip"
          echo "sha256=${sha256}" >> $env:GITHUB_OUTPUT
          echo "release_name=${release_name}.zip" >> $env:GITHUB_OUTPUT
          echo "asset_path=${asset_path}" >> $env:GITHUB_OUTPUT
          echo "krb_ver=${krb_ver}" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.asset_path }}
          name: Karbo CLI Suite ${{ steps.build.outputs.krb_ver }}
          append_body: true
          body: |
            [Download for Windows](../../releases/download/${{ steps.build.outputs.krb_ver }}/${{ steps.build.outputs.release_name }}) `SHA256: ${{ steps.build.outputs.sha256 }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-arm64:
    name: macOS 15 (ARM64)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Boost (ARM64)
        uses: MarkusJx/install-boost@v2
        id: install-boost
        with:
          boost_version: 1.86.0
          platform: macos
          platform_version: 15
          toolset: clang
          arch: aarch64

      - name: Build
        id: build
        run: |
          set -e

          BOOST_ROOT="${{ steps.install-boost.outputs.BOOST_ROOT }}"
          Boost_INCLUDE_DIR="$BOOST_ROOT/include"
          Boost_LIBRARY_DIR="$BOOST_ROOT/lib"

          build_folder="build"
          krb_ver="${GITHUB_REF#refs/tags/}"
          release_name="Karbo-cli-macOS-ARM64-$krb_ver"

          brew install openssl@3
          brew link openssl@3 --force

          mkdir -p "$build_folder"
          cd "$build_folder"

          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DOPENSSL_USE_STATIC_LIBS=ON \
            -DBOOST_ROOT="$BOOST_ROOT" \
            -DBoost_INCLUDE_DIR="$Boost_INCLUDE_DIR" \
            -DBoost_LIBRARY_DIR="$Boost_LIBRARY_DIR" \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DBoost_USE_STATIC_LIBS=ON \
            -DBoost_COMPILER=-clang \
            -DBoost_ARCHITECTURE=-a64 \
            -DBoost_THREADAPI=pthread

          make -j$(sysctl -n hw.ncpu)

          mkdir "$release_name"
          exeFiles=()
          for f in src/*; do
            [[ -x $f && -f $f ]] && strip "$f" && exeFiles+=( "$f" )
          done

          cp "${exeFiles[@]}" "$release_name/"
          zip -r "$release_name.zip" "$release_name"

          sha256=$(shasum -a 256 "$release_name.zip" | awk '{print toupper($1)}')

          echo "sha256=$sha256" >> $GITHUB_OUTPUT
          echo "release_name=$release_name.zip" >> $GITHUB_OUTPUT
          echo "asset_path=$build_folder/$release_name.zip" >> $GITHUB_OUTPUT
          echo "krb_ver=$krb_ver" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.asset_path }}
          name: Karbo CLI Suite ${{ steps.build.outputs.krb_ver }}
          append_body: true
          body: |
            [Download for macOS ARM64](../../releases/download/${{ steps.build.outputs.krb_ver }}/${{ steps.build.outputs.release_name }})  
            `SHA256: ${{ steps.build.outputs.sha256 }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ubuntu24:
    name: Ubuntu 24.04
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@master
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Build
        id: build
        run: |
          sudo apt-get update && sudo apt-get install -y libboost-all-dev
          build_folder="build/release"
          krb_ver=$(echo "$GITHUB_REF" | sed 's|refs/tags/||')
          release_name=Karbo-cli-ubuntu24.04-"$krb_ver"
          mkdir -p "$build_folder"
          cd "$build_folder"
          cmake -D ARCH=default -D CMAKE_BUILD_TYPE=Release \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
            -DCMAKE_CXX_FLAGS_RELEASE="-O3 -DNDEBUG" \
            -D CMAKE_POSITION_INDEPENDENT_CODE:BOOL=true \
            -D BOOST_IGNORE_SYSTEM_PATHS_DEFAULT=ON \
            -D BOOST_ROOT=/usr ../..
          make
          cd src
          exeFiles=()
          for f in ./*; do [[ -x $f && -f $f ]] && exeFiles+=( "$f" ); done
          strip "${exeFiles[@]}"
          tar -czf "$release_name".tar.gz "${exeFiles[@]}"
          mv "$release_name".tar.gz ../
          cd ..
          sha256=$(shasum -a 256 "$release_name".tar.gz | awk '{print toupper($1)}')
          asset_path="./$build_folder/$release_name.tar.gz"
          echo "sha256=${sha256}" >> $GITHUB_OUTPUT
          echo "release_name=${release_name}.tar.gz" >> $GITHUB_OUTPUT
          echo "asset_path=${asset_path}" >> $GITHUB_OUTPUT
          echo "krb_ver=${krb_ver}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.asset_path }}
          name: Karbo CLI Suite ${{ steps.build.outputs.krb_ver }}
          append_body: true
          body: |
            [Download for Ubuntu 24.04](../../releases/download/${{ steps.build.outputs.krb_ver }}/${{ steps.build.outputs.release_name }}) `SHA256: ${{ steps.build.outputs.sha256 }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-static:
    name: Linux universal static
    runs-on: ubuntu-latest
    container:
      image: alpine:3.19
      options: --platform linux/amd64

    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache \
            git \
            build-base \
            cmake \
            boost-dev boost-static \
            openssl-dev openssl-libs-static \
            lmdb-dev \
            linux-headers \
            binutils \
            file

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Mark git repo as safe
        run: git config --global --add safe.directory '*'

      - name: Build static
        id: build
        run: |
          build_folder="build/release"
          krb_ver=$(echo "$GITHUB_REF" | sed 's|refs/tags/||')
          release_name="Karbo-cli-linux-universal-$krb_ver"

          mkdir -p "$build_folder"
          cd "$build_folder"

          export CFLAGS="-O3 -static"
          export CXXFLAGS="-O3 -static -static-libstdc++ -static-libgcc"
          export LDFLAGS="-static"

          cmake ../.. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBoost_USE_STATIC_LIBS=ON \
            -DOPENSSL_USE_STATIC_LIBS=ON \
            -DCMAKE_EXE_LINKER_FLAGS="-static"

          make -j$(nproc)

          cd src
          exeFiles=()
          for f in ./*; do [[ -x $f && -f $f ]] && exeFiles+=( "$f" ); done
          strip "${exeFiles[@]}"
          tar -czf "$release_name".tar.gz "${exeFiles[@]}"
          mv "$release_name".tar.gz ../
          cd ..
          sha256=$(shasum -a 256 "$release_name.tar.gz" | awk '{print toupper($1)}')
          asset_path="./$build_folder/$release_name.tar.gz"

          echo "sha256=${sha256}" >> $GITHUB_OUTPUT
          echo "release_name=${release_name}.tar.gz" >> $GITHUB_OUTPUT
          echo "asset_path=${asset_path}" >> $GITHUB_OUTPUT
          echo "krb_ver=${krb_ver}" >> $GITHUB_OUTPUT

      - name: Verify static linkage
        run: |
          FAILED=0
          for f in build/release/src/*; do
            if [ -x "$f" ] && [ -f "$f" ]; then
              echo "=== $f ==="
              file "$f"
              if readelf -d "$f" | grep NEEDED; then
                echo "FAIL: dynamic dependency found"
                FAILED=1
              else
                echo "OK: fully static"
              fi
            fi
          done
          if [ "$FAILED" = "1" ]; then
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.asset_path }}
          name: Karbo CLI Suite ${{ steps.build.outputs.krb_ver }}
          append_body: true
          body: |
            [Download Universal Binaries for Linux](../../releases/download/${{ steps.build.outputs.krb_ver }}/${{ steps.build.outputs.release_name }}) `SHA256: ${{ steps.build.outputs.sha256 }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    name: Android arm64-v8a
    runs-on: ubuntu-24.04

    env:
      ANDROID_ABI: arm64-v8a
      ANDROID_API: 28
      BUILD_DIR: build/arm64-v8a
      NDK_VERSION: "26.3.11579264"
      BOOST_VERSION_TAG: "ndk_26b_boost_1.83.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build wget unzip git build-essential python3 zip

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" \
                     "build-tools;34.0.0" \
                     "platforms;android-${ANDROID_API}" \
                     "ndk;${NDK_VERSION}"

      - name: Set NDK path
        run: |
          NDK_PATH=$ANDROID_HOME/ndk/${NDK_VERSION}
          echo "NDK_PATH=$NDK_PATH" >> $GITHUB_ENV
          echo "Using NDK at: $NDK_PATH"

      - name: Cache Boost and OpenSSL
        id: cache-prebuilts
        uses: actions/cache@v4
        with:
          path: |
            ~/opt/android/boost
            ~/opt/android/openssl
          key: android-prebuilts-arm64-boost183-openssl111k-ndk26b-v2

      - name: Fetch Boost
        if: steps.cache-prebuilts.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${HOME}/opt/android
          wget -nv https://github.com/dec1/Boost-for-Android/releases/download/${BOOST_VERSION_TAG}/${BOOST_VERSION_TAG}.zip
          unzip -q ${BOOST_VERSION_TAG}.zip -d ${HOME}/opt/android/boost/

      - name: Fetch OpenSSL prebuilt
        if: steps.cache-prebuilts.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/PurpleI2P/OpenSSL-for-Android-Prebuilt.git ${HOME}/opt/android/openssl

      - name: Set prebuilt env paths
        run: |
          BOOST_BASE=${HOME}/opt/android/boost/${BOOST_VERSION_TAG}
          if [ -d "$BOOST_BASE/libs/${ANDROID_ABI}/static" ]; then
            BOOST_LIB_DIR="$BOOST_BASE/libs/${ANDROID_ABI}/static"
          else
            BOOST_LIB_DIR="$BOOST_BASE/libs/${ANDROID_ABI}"
          fi
          echo "BOOST_ROOT=$BOOST_BASE"             >> $GITHUB_ENV
          echo "BOOST_INCLUDE_DIR=$BOOST_BASE/include" >> $GITHUB_ENV
          echo "BOOST_LIB_DIR=$BOOST_LIB_DIR"       >> $GITHUB_ENV
          echo "OPENSSL_ROOT=${HOME}/opt/android/openssl/openssl-1.1.1k-clang" >> $GITHUB_ENV

      - name: Configure CMake
        run: |
          set -x
          rm -rf $BUILD_DIR && mkdir -p $BUILD_DIR
          cd $BUILD_DIR

          cmake ../.. \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_PATH/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=$ANDROID_ABI \
            -DANDROID_PLATFORM=android-$ANDROID_API \
            -DANDROID_NATIVE_API_LEVEL=$ANDROID_API \
            -DANDROID_TOOLCHAIN=clang \
            -DANDROID_STL=c++_static \
            -DSTATIC=ON \
            -DANDROID=true \
            -DOPENSSL_ROOT_DIR=$OPENSSL_ROOT \
            -DOPENSSL_SSL_LIBRARY=$OPENSSL_ROOT/$ANDROID_ABI/lib/libssl.a \
            -DOPENSSL_CRYPTO_LIBRARY=$OPENSSL_ROOT/$ANDROID_ABI/lib/libcrypto.a \
            -DOPENSSL_INCLUDE_DIR=$OPENSSL_ROOT/include \
            -DBoost_DEBUG=ON \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DBoost_USE_STATIC_LIBS=ON \
            -DBoost_USE_STATIC_RUNTIME=ON \
            -DBOOST_ROOT=$BOOST_ROOT \
            -DBoost_INCLUDE_DIR=$BOOST_INCLUDE_DIR \
            -DBoost_LIBRARY_DIR=$BOOST_LIB_DIR \
            -DBoost_LIBRARY_DIRS=$BOOST_LIB_DIR \
            -DCMAKE_FIND_PACKAGE_PREFER_CONFIG=OFF \
            -DCMAKE_POLICY_DEFAULT_CMP0074=NEW \
            -DCMAKE_POLICY_DEFAULT_CMP0144=OLD \
            -DCMAKE_POLICY_DEFAULT_CMP0167=OLD \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_VERBOSE_MAKEFILE=ON \
            -G Ninja

      - name: Build binaries
        run: |
          cd $BUILD_DIR
          ninja

      - name: Package binaries
        id: package
        run: |
          cd $BUILD_DIR/src
          krb_ver=$(echo "$GITHUB_REF" | sed 's|refs/tags/||')
          release_name="Karbo-cli-android-${ANDROID_ABI}-$krb_ver"
          mkdir -p "$release_name"
          STRIP=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          for bin in karbowanecd simplewallet greenwallet optimizer walletd vanitygen; do
            if [ -f "$bin" ]; then
              $STRIP "$bin" || true
              cp "$bin" "$release_name/"
            fi
          done
          zip -r "$release_name.zip" "$release_name"
          sha256=$(shasum -a 256 "$release_name.zip" | awk '{print toupper($1)}')
          echo "sha256=${sha256}" >> $GITHUB_OUTPUT
          echo "release_name=${release_name}.zip" >> $GITHUB_OUTPUT
          echo "asset_path=$BUILD_DIR/src/$release_name.zip" >> $GITHUB_OUTPUT
          echo "krb_ver=${krb_ver}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.asset_path }}
          name: Karbo CLI Suite ${{ steps.package.outputs.krb_ver }}
          append_body: true
          body: |
            [Download for Android arm64-v8a](../../releases/download/${{ steps.package.outputs.krb_ver }}/${{ steps.package.outputs.release_name }}) `SHA256: ${{ steps.package.outputs.sha256 }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
